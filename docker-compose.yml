version: "3.9"
services:
  postgres:
    image: postgres:15-alpine
    container_name: musa_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: musa_dev
    ports:
      - "5432:5432"
    volumes:
      - musa_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  musa_postgres_data:
